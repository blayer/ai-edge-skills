<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Guessing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
  h2 { color: #64ffda; font-size: 20px; margin-bottom: 4px; }

  .range-section { width: 100%; max-width: 340px; margin: 16px 0 12px; }
  .range-labels { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; margin-bottom: 6px; }
  .range-lo { color: #e94560; }
  .range-hi { color: #4A90D9; }
  .range-bar { width: 100%; height: 12px; background: #0f3460; border-radius: 6px; position: relative; overflow: hidden; }
  .range-fill { height: 100%; border-radius: 6px; position: absolute; background: linear-gradient(90deg, #e94560, #64ffda, #4A90D9); transition: left 0.4s, width 0.4s; }
  .range-center { text-align: center; margin-top: 6px; color: #64ffda; font-size: 13px; font-weight: bold; }

  .feedback { margin: 16px 0; text-align: center; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .feedback .number { font-size: 48px; font-weight: bold; color: #fff; }
  .feedback .hint { font-size: 18px; font-weight: bold; margin-top: 4px; }
  .feedback .hint.higher { color: #e94560; }
  .feedback .hint.lower { color: #4A90D9; }
  .feedback .hint.correct { color: #64ffda; }
  .start-msg { color: #a8b2d1; font-size: 16px; text-align: center; line-height: 1.6; }

  .info { color: #a8b2d1; font-size: 13px; margin: 8px 0; }

  .history { width: 100%; max-width: 340px; margin: 12px 0; }
  .history-title { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .guess-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #16213e; border-radius: 8px; margin-bottom: 4px; }
  .attempt-badge { color: #555; font-size: 11px; min-width: 24px; }
  .guess-num { font-size: 18px; font-weight: bold; color: #fff; flex: 1; }
  .guess-arrow { font-size: 14px; font-weight: bold; }
  .guess-arrow.higher { color: #e94560; }
  .guess-arrow.lower { color: #4A90D9; }
  .guess-arrow.correct { color: #64ffda; }

  .status-banner { font-size: 22px; font-weight: bold; padding: 14px 28px; border-radius: 12px; margin: 16px 0; text-align: center; animation: popIn 0.4s ease; }
  .status-banner.won { background: #064e3b; color: #64ffda; }
  .status-banner .sub { font-size: 14px; color: #a8b2d1; margin-top: 4px; }
  @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  .prompt { color: #888; font-size: 13px; margin-top: 12px; }
</style>
</head>
<body>
<h2>Number Guessing</h2>

<div class="range-section">
  <div class="range-labels"><span class="range-lo" id="loLabel"></span><span class="range-hi" id="hiLabel"></span></div>
  <div class="range-bar"><div class="range-fill" id="rangeFill"></div></div>
  <div class="range-center" id="rangeCenter"></div>
</div>

<div class="feedback" id="feedback"></div>
<div class="info" id="info"></div>
<div class="history" id="history"></div>
<div id="banner"></div>
<div class="prompt" id="prompt"></div>

<script>
const params = new URLSearchParams(window.location.search);
const state = JSON.parse(decodeURIComponent(params.get('data')));

const lo = state.currentLo;
const hi = state.currentHi;
const totalRange = state.max - state.min || 1;

// Range bar
document.getElementById('loLabel').textContent = lo;
document.getElementById('hiLabel').textContent = hi;
const fillLeft = ((lo - state.min) / totalRange) * 100;
const fillWidth = Math.max(((hi - lo + 1) / totalRange) * 100, 1);
document.getElementById('rangeFill').style.left = fillLeft + '%';
document.getElementById('rangeFill').style.width = fillWidth + '%';
document.getElementById('rangeCenter').textContent = `Range: ${lo} — ${hi} (${hi - lo + 1} numbers)`;

// Feedback
const fb = document.getElementById('feedback');
if (state.guessHistory.length === 0) {
  fb.innerHTML = `<div class="start-msg">I'm thinking of a number<br>between <strong>${state.min}</strong> and <strong>${state.max}</strong></div>`;
} else {
  const last = state.guessHistory[state.guessHistory.length - 1];
  const hintText = last.hint === 'higher' ? '↑ Go Higher!' :
                   last.hint === 'lower' ? '↓ Go Lower!' : '✓ Correct!';
  fb.innerHTML = `<div class="number">${last.guess}</div><div class="hint ${last.hint}">${hintText}</div>`;
}

// Info
document.getElementById('info').textContent = state.attempts > 0 ? `Attempts: ${state.attempts}` : '';

// History
const histEl = document.getElementById('history');
if (state.guessHistory.length > 1) {
  let html = '<div class="history-title">Guess History</div>';
  state.guessHistory.forEach((g, i) => {
    const arrow = g.hint === 'higher' ? '↑ Higher' : g.hint === 'lower' ? '↓ Lower' : '✓ Correct';
    html += `<div class="guess-row">
      <span class="attempt-badge">#${i + 1}</span>
      <span class="guess-num">${g.guess}</span>
      <span class="guess-arrow ${g.hint}">${arrow}</span>
    </div>`;
  });
  histEl.innerHTML = html;
}

// Win banner
if (state.status === 'won') {
  const msg = state.attempts === 1 ? 'First try! Incredible!' :
              state.attempts <= 3 ? 'Excellent!' :
              state.attempts <= 7 ? 'Good job!' : 'You got it!';
  document.getElementById('banner').innerHTML =
    `<div class="status-banner won">${msg}<div class="sub">Found in ${state.attempts} attempt${state.attempts > 1 ? 's' : ''}</div></div>`;
  document.getElementById('prompt').textContent = 'Say "start" to play again.';
} else if (state.attempts === 0) {
  document.getElementById('prompt').textContent = 'Tell me your guess!';
} else {
  document.getElementById('prompt').textContent = 'Guess again!';
}
</script>
</body>
</html>
