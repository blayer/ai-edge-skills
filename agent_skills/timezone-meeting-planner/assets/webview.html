<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timezone Meeting Planner</title>
<style>
  body { margin: 0; padding: 16px; font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; }
  h2 { color: #64ffda; margin: 0 0 16px; font-size: 18px; }
  .grid-container { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; min-width: 600px; }
  th { padding: 8px; font-size: 12px; color: #64ffda; background: #16213e; position: sticky; left: 0; z-index: 1; }
  td { padding: 6px 4px; text-align: center; font-size: 11px; min-width: 32px; border: 1px solid #0f3460; }
  .work { background: #1b4332; color: #64ffda; }
  .overlap { background: #064e3b; color: #fff; font-weight: bold; }
  .off { background: #16213e; color: #444; }
  .sleep { background: #1a1a2e; color: #333; }
  .summary { background: #16213e; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
  .summary strong { color: #64ffda; }
  .best-slot { color: #ffd700; font-weight: bold; }
</style>
</head>
<body>
<h2>Timezone Meeting Planner</h2><div id="summary" class="summary"></div><div class="grid-container"><table id="grid"></table></div>
<script>
const params = new URLSearchParams(window.location.search);
const input = JSON.parse(decodeURIComponent(params.get('data')));
const tzs = input.timezones || [{ name: 'UTC', utc_offset: 0 }];
const globalWorkStart = input.work_start ?? 9;
const globalWorkEnd = input.work_end ?? 17;
const minDuration = input.min_duration || 0; // in minutes

const hours = Array.from({length: 24}, (_, i) => i);

// Per-person availability: use available_start/available_end if set, else global
function getAvailability(tz) {
  return {
    start: tz.available_start ?? globalWorkStart,
    end: tz.available_end ?? globalWorkEnd
  };
}

function isAvailable(localHour, tz) {
  const { start, end } = getAvailability(tz);
  if (start <= end) {
    return localHour >= start && localHour < end;
  }
  // Wraps midnight (e.g., 19-23 means 19,20,21,22)
  return localHour >= start || localHour < end;
}

// Find overlap hours (in UTC)
const overlapHours = hours.filter(utcHour => {
  return tzs.every(tz => {
    const local = ((utcHour + tz.utc_offset) % 24 + 24) % 24;
    return isAvailable(local, tz);
  });
});

const summaryEl = document.getElementById('summary');

// Find contiguous blocks
function findBlocks(hrs) {
  if (hrs.length === 0) return [];
  const sorted = [...hrs].sort((a, b) => a - b);
  const blocks = [];
  let start = sorted[0], prev = sorted[0];
  for (let i = 1; i <= sorted.length; i++) {
    if (i < sorted.length && sorted[i] === prev + 1) {
      prev = sorted[i];
    } else {
      blocks.push({ start, end: prev + 1, length: prev - start + 1 });
      if (i < sorted.length) { start = sorted[i]; prev = sorted[i]; }
    }
  }
  return blocks;
}

const blocks = findBlocks(overlapHours);
const minHours = Math.ceil(minDuration / 60);

if (overlapHours.length > 0) {
  const ranges = blocks.map(b => `${b.start}:00-${b.end}:00 UTC (${b.length}h)`);

  // Find best slot (longest block meeting min_duration)
  const validBlocks = minDuration > 0 ? blocks.filter(b => b.length * 60 >= minDuration) : blocks;
  let bestInfo = '';
  if (minDuration > 0 && validBlocks.length > 0) {
    const best = validBlocks.reduce((a, b) => a.length >= b.length ? a : b);
    const localTimes = tzs.map(tz => {
      const s = ((best.start + tz.utc_offset) % 24 + 24) % 24;
      const e = ((best.end + tz.utc_offset) % 24 + 24) % 24;
      return `${tz.name}: ${s}:00-${e}:00`;
    }).join(' | ');
    bestInfo = `<br><span class="best-slot">Best slot (${best.length}h): ${localTimes}</span>`;
  } else if (minDuration > 0 && validBlocks.length === 0) {
    bestInfo = `<br><span style="color:#e94560">No slot meets minimum ${minDuration} min duration.</span>`;
  }

  const localSummary = tzs.map(tz => {
    const s = ((overlapHours[0]+tz.utc_offset)%24+24)%24;
    const e = ((overlapHours[overlapHours.length-1]+1+tz.utc_offset)%24+24)%24;
    return `${tz.name}: ${s}:00-${e}:00`;
  }).join(' | ');

  summaryEl.innerHTML = `<strong>${overlapHours.length}h</strong> overlap: ${ranges.join(', ')}<br>${localSummary}${bestInfo}`;
} else {
  summaryEl.innerHTML = '<strong style="color:#e94560">No overlapping available hours found.</strong>';
}

const headerRow = '<tr><th>Timezone</th>' + hours.map(h => `<td style="background:#0f3460;color:#a8b2d1;font-size:10px">${h}</td>`).join('') + '</tr>';
const rows = tzs.map(tz => {
  const { start, end } = getAvailability(tz);
  return '<tr><th>' + tz.name + '<br><span style="font-size:10px;color:#a8b2d1">UTC' + (tz.utc_offset >= 0 ? '+' : '') + tz.utc_offset + '</span>' +
    `<br><span style="font-size:9px;color:#888">${start}:00-${end}:00</span>` + '</th>' +
    hours.map(utcHour => {
      const local = ((utcHour + tz.utc_offset) % 24 + 24) % 24;
      const isWork = isAvailable(local, tz);
      const isOverlap = overlapHours.includes(utcHour);
      const cls = isOverlap ? 'overlap' : isWork ? 'work' : local >= 22 || local < 6 ? 'sleep' : 'off';
      return `<td class="${cls}">${local}</td>`;
    }).join('') + '</tr>';
}).join('');

document.getElementById('grid').innerHTML = headerRow + rows;
</script>
</body>
</html>
