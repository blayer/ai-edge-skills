<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mermaid Diagram Renderer</title>
<style>
  body { margin: 0; padding: 16px; font-family: -apple-system, sans-serif; background: #fff; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #diagram { max-width: 100%; overflow: auto; }
  .error { color: #e94560; font-size: 14px; padding: 16px; }
</style>
</head>
<body>
<div id="diagram"></div>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
  const params = new URLSearchParams(window.location.search);
  const input = JSON.parse(decodeURIComponent(params.get('data')));
  const code = input.code || 'graph TD\n  A-->B';
  const theme = input.theme || 'default';

  mermaid.initialize({ startOnLoad: false, theme: theme, securityLevel: 'loose' });
  try {
    const { svg } = await mermaid.render('mermaid-svg', code);
    document.getElementById('diagram').innerHTML = svg;
  } catch (e) {
    document.getElementById('diagram').innerHTML = `<div class="error">Render error: ${e.message}</div><pre style="background:#f5f5f5;padding:12px;border-radius:8px;font-size:13px">${code}</pre>`;
  }
</script>
</body>
</html>
