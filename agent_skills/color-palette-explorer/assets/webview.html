<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette Explorer</title>
<style>
  body { margin: 0; padding: 16px; font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; }
  h2 { color: #64ffda; margin: 0 0 4px; font-size: 18px; }
  .mood { color: #a8b2d1; font-size: 13px; margin-bottom: 16px; }
  .palette { display: flex; border-radius: 12px; overflow: hidden; height: 120px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .palette div { flex: 1; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; font-size: 11px; font-weight: bold; }
  .swatches { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; }
  .swatch { background: #16213e; border-radius: 8px; overflow: hidden; }
  .swatch-color { height: 80px; }
  .swatch-info { padding: 10px; }
  .swatch-hex { font-family: monospace; font-size: 14px; color: #ffd700; }
  .swatch-rgb { font-size: 11px; color: #a8b2d1; margin-top: 2px; }
  .swatch-hsl { font-size: 11px; color: #a8b2d1; }
</style>
</head>
<body>
<h2>Color Palette</h2><div class="mood" id="mood"></div><div class="palette" id="palette"></div><div class="swatches" id="swatches"></div>
<script>
const params = new URLSearchParams(window.location.search);
const input = JSON.parse(decodeURIComponent(params.get('data')));
const mood = input.mood || 'default';
const count = input.count || 5;
const baseColor = input.base_color;

document.getElementById('mood').textContent = mood;

function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => { const k = (n + h / 30) % 12; return Math.round((l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1))) * 255); };
  return '#' + [f(0), f(8), f(4)].map(x => x.toString(16).padStart(2, '0')).join('');
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}

function hexToHsl(hex) {
  let { r, g, b } = hexToRgb(hex); r/=255; g/=255; b/=255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), l = (max+min)/2;
  let h = 0, s = 0;
  if (max !== min) {
    const d = max - min; s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    if (max===r) h = ((g-b)/d + (g<b?6:0))/6;
    else if (max===g) h = ((b-r)/d+2)/6;
    else h = ((r-g)/d+4)/6;
  }
  return { h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100) };
}

const moods = {
  sunset: [0, 20, 40, 280, 300], ocean: [180, 200, 210, 220, 240],
  forest: [100, 120, 140, 80, 160], fire: [0, 10, 20, 30, 45],
  pastel: [0, 60, 120, 180, 280], neon: [120, 180, 280, 320, 60],
  earth: [20, 30, 40, 80, 120], midnight: [220, 240, 260, 280, 300],
  spring: [80, 100, 120, 320, 340], autumn: [20, 30, 40, 10, 0],
  candy: [330, 350, 280, 200, 160], royal: [260, 280, 220, 40, 0],
};

let colors = [];
if (baseColor) {
  const { h } = hexToHsl(baseColor);
  colors = Array.from({length: count}, (_, i) => hslToHex((h + i * (360/count)) % 360, 70, 55));
} else {
  const hues = moods[mood.toLowerCase()] || Array.from({length: count}, (_, i) => (i * 360 / count));
  colors = hues.slice(0, count).map((h, i) => hslToHex(h, 65 + (i%2)*15, 50 + (i%3)*10));
}

const contrast = hex => { const {r,g,b} = hexToRgb(hex); return (r*299+g*587+b*114)/1000 > 128 ? '#000' : '#fff'; };

document.getElementById('palette').innerHTML = colors.map(c => `<div style="background:${c};color:${contrast(c)}">${c}</div>`).join('');
document.getElementById('swatches').innerHTML = colors.map(c => {
  const rgb = hexToRgb(c), hsl = hexToHsl(c);
  return `<div class="swatch"><div class="swatch-color" style="background:${c}"></div><div class="swatch-info"><div class="swatch-hex">${c}</div><div class="swatch-rgb">rgb(${rgb.r}, ${rgb.g}, ${rgb.b})</div><div class="swatch-hsl">hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)</div></div></div>`;
}).join('');
</script>
</body>
</html>
