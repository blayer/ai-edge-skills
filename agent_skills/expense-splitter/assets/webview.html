<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Splitter</title>
<style>
  body { margin: 0; padding: 16px; font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; }
  h2 { color: #64ffda; margin: 0 0 16px; font-size: 18px; }
  .section { margin-bottom: 20px; }
  .section h3 { color: #a8b2d1; font-size: 14px; margin: 0 0 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; background: #16213e; border-radius: 8px; overflow: hidden; }
  th { text-align: left; color: #64ffda; padding: 8px 12px; background: #0f3460; }
  td { padding: 6px 12px; color: #ccc; border-bottom: 1px solid #0f3460; }
  .settlement { background: #16213e; border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
  .arrow { color: #e94560; font-size: 20px; }
  .person { color: #64ffda; font-weight: bold; }
  .amount { color: #ffd700; font-weight: bold; font-size: 16px; }
  .balance-pos { color: #64ffda; } .balance-neg { color: #e94560; }
</style>
</head>
<body>
<h2>Expense Splitter</h2><div id="content"></div>
<script>
const params = new URLSearchParams(window.location.search);
const input = JSON.parse(decodeURIComponent(params.get('data')));
const expenses = input.expenses || [];
const fmt = n => '$' + Math.abs(n).toFixed(2);

// Calculate balances
const balances = {};
expenses.forEach(exp => {
  const share = exp.amount / exp.participants.length;
  balances[exp.payer] = (balances[exp.payer] || 0) + exp.amount - share;
  exp.participants.forEach(p => {
    if (p !== exp.payer) balances[p] = (balances[p] || 0) - share;
  });
});

// Simplify debts
const debtors = [], creditors = [];
Object.entries(balances).forEach(([name, bal]) => {
  if (bal < -0.01) debtors.push({ name, amount: -bal });
  else if (bal > 0.01) creditors.push({ name, amount: bal });
});
debtors.sort((a, b) => b.amount - a.amount);
creditors.sort((a, b) => b.amount - a.amount);

const settlements = [];
let di = 0, ci = 0;
while (di < debtors.length && ci < creditors.length) {
  const payment = Math.min(debtors[di].amount, creditors[ci].amount);
  settlements.push({ from: debtors[di].name, to: creditors[ci].name, amount: payment });
  debtors[di].amount -= payment;
  creditors[ci].amount -= payment;
  if (debtors[di].amount < 0.01) di++;
  if (creditors[ci].amount < 0.01) ci++;
}

const totalSpent = expenses.reduce((s, e) => s + e.amount, 0);

document.getElementById('content').innerHTML = `
  <div class="section"><h3>Expenses (Total: ${fmt(totalSpent)})</h3>
    <table><tr><th>Payer</th><th>Amount</th><th>Split Among</th></tr>
    ${expenses.map(e => `<tr><td>${e.payer}</td><td>${fmt(e.amount)}</td><td>${e.participants.join(', ')}</td></tr>`).join('')}</table></div>
  <div class="section"><h3>Balances</h3>
    <table><tr><th>Person</th><th>Balance</th></tr>
    ${Object.entries(balances).sort((a,b) => b[1]-a[1]).map(([n,b]) => `<tr><td>${n}</td><td class="${b>=0?'balance-pos':'balance-neg'}">${b>=0?'+':''}${fmt(b)}</td></tr>`).join('')}</table></div>
  <div class="section"><h3>Settlements (${settlements.length} payment${settlements.length!==1?'s':''})</h3>
    ${settlements.map(s => `<div class="settlement"><span class="person">${s.from}</span><span class="arrow">→</span><span class="person">${s.to}</span><span class="amount">${fmt(s.amount)}</span></div>`).join('')}
    ${settlements.length===0?'<div style="color:#a8b2d1">All settled!</div>':''}</div>`;
</script>
</body>
</html>
