<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangman</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 6px 10px; }
  .header { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
  .header h2 { color: #64ffda; font-size: 14px; }
  .header .cat { color: #a8b2d1; font-size: 11px; }
  .gallows { font-size: 20px; letter-spacing: 2px; margin: 2px 0; height: 24px; }
  .word { display: flex; gap: 5px; margin: 4px 0; justify-content: center; flex-wrap: wrap; }
  .letter-slot { width: 20px; height: 26px; border-bottom: 2px solid #64ffda; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; color: #fff; text-transform: uppercase; transition: color 0.3s; }
  .letter-slot.revealed { color: #64ffda; }
  .letter-slot.miss { color: #e94560; }
  .letter-slot.reveal-anim { animation: popIn 0.3s ease; }
  @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
  .shake { animation: shake 0.25s ease; }
  .keyboard { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; max-width: 310px; margin: 4px 0; }
  .key { width: 26px; height: 26px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; background: #16213e; color: #a8b2d1; border: 1px solid #0f3460; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
  .key:active { transform: scale(0.9); }
  .key.correct { background: #064e3b; color: #64ffda; border-color: #64ffda; pointer-events: none; }
  .key.wrong { background: #3b1423; color: #e94560; border-color: #e94560; pointer-events: none; }
  .key.disabled { opacity: 0.3; pointer-events: none; }
  .status-banner { font-size: 16px; font-weight: bold; padding: 6px 14px; border-radius: 8px; margin: 4px 0; text-align: center; }
  .status-banner.won { background: #064e3b; color: #64ffda; }
  .status-banner.lost { background: #3b1423; color: #e94560; }
  .status-banner .word-reveal { font-size: 11px; margin-top: 2px; color: #a8b2d1; }
  .play-again { margin-top: 4px; padding: 6px 20px; background: #64ffda; color: #1a1a2e; border: none; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; display: none; }
  .play-again:active { transform: scale(0.95); }
</style>
</head>
<body>
<div class="header"><h2>Hangman</h2><span class="cat" id="category"></span></div>
<div class="gallows" id="gallows"></div>
<div class="word" id="word"></div>
<div id="banner"></div>
<div class="keyboard" id="keyboard"></div>
<button class="play-again" id="playAgain">Play Again</button>
<script>
const params = new URLSearchParams(window.location.search);
const initData = JSON.parse(decodeURIComponent(params.get('data')));

// Word bank — must be declared before pickWord
const words = {
  animals: ['elephant', 'giraffe', 'penguin', 'dolphin', 'kangaroo', 'cheetah', 'octopus', 'hamster', 'leopard', 'walrus'],
  countries: ['brazil', 'japan', 'france', 'canada', 'australia', 'egypt', 'mexico', 'sweden', 'norway', 'greece'],
  fruits: ['banana', 'mango', 'strawberry', 'pineapple', 'blueberry', 'watermelon', 'cherry', 'papaya', 'apricot', 'coconut'],
  colors: ['crimson', 'turquoise', 'magenta', 'indigo', 'scarlet', 'lavender', 'emerald', 'amber', 'violet', 'maroon'],
  sports: ['basketball', 'swimming', 'football', 'tennis', 'baseball', 'cricket', 'hockey', 'boxing', 'surfing', 'fencing']
};

function pickWord(category) {
  const cats = Object.keys(words);
  const cat = words[category] ? category : cats[Math.floor(Math.random() * cats.length)];
  const list = words[cat];
  return { word: list[Math.floor(Math.random() * list.length)], category: cat };
}

const startPick = pickWord(initData.category);
const game = {
  word: startPick.word,
  category: startPick.category,
  guessed: [],
  allGuesses: [],
  wrong: 0,
  status: 'playing'
};

// Text-based gallows — compact, fits in small webview card
// Shows lives as hearts: ❤️❤️❤️❤️❤️❤️ → loses hearts as wrong guesses increase
function render() {
  // Gallows: show remaining lives as hearts
  const lives = 6 - game.wrong;
  const gallows = document.getElementById('gallows');
  gallows.innerHTML = '<span style="color:#e94560">' + '❤'.repeat(lives) + '</span>' +
    '<span style="color:#333">' + '🖤'.repeat(game.wrong) + '</span>';

  // Word slots
  const wordEl = document.getElementById('word');
  wordEl.innerHTML = '';
  game.word.split('').forEach(c => {
    const slot = document.createElement('div');
    const isRevealed = game.guessed.includes(c);
    slot.className = 'letter-slot' + (isRevealed ? ' revealed' : '') +
      (game.status === 'lost' && !isRevealed ? ' miss' : '');
    slot.textContent = isRevealed ? c : (game.status === 'lost' ? c : '');
    wordEl.appendChild(slot);
  });

  // Category
  document.getElementById('category').textContent = game.category + ' · ' + lives + ' left';

  // Banner
  const banner = document.getElementById('banner');
  const playBtn = document.getElementById('playAgain');
  if (game.status === 'won') {
    banner.innerHTML = '<div class="status-banner won">You Won!</div>';
    playBtn.style.display = 'block';
  } else if (game.status === 'lost') {
    banner.innerHTML = '<div class="status-banner lost">Game Over<div class="word-reveal">Word: ' + game.word + '</div></div>';
    playBtn.style.display = 'block';
  } else {
    banner.innerHTML = '';
    playBtn.style.display = 'none';
  }

  // Keyboard
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  'abcdefghijklmnopqrstuvwxyz'.split('').forEach(letter => {
    const key = document.createElement('div');
    key.className = 'key';
    key.textContent = letter;
    if (game.allGuesses.includes(letter)) {
      key.className += game.word.includes(letter) ? ' correct' : ' wrong';
    } else if (game.status !== 'playing') {
      key.className += ' disabled';
    } else {
      key.addEventListener('click', () => guessLetter(letter));
    }
    kb.appendChild(key);
  });
}

function guessLetter(letter) {
  if (game.status !== 'playing') return;
  if (game.allGuesses.includes(letter)) return;

  game.allGuesses.push(letter);

  if (game.word.includes(letter)) {
    game.guessed.push(letter);
    // Animate revealed letters
    render();
    const slots = document.querySelectorAll('.letter-slot.revealed');
    slots.forEach(s => { if (s.textContent === letter) s.classList.add('reveal-anim'); });
  } else {
    game.wrong++;
    render();
    // Shake the gallows on wrong guess
    document.getElementById('gallows').classList.add('shake');
    setTimeout(() => document.getElementById('gallows').classList.remove('shake'), 250);
  }

  // Check win/lose
  const allRevealed = game.word.split('').every(c => game.guessed.includes(c));
  if (allRevealed) {
    game.status = 'won';
    render();
  } else if (game.wrong >= 6) {
    game.status = 'lost';
    render();
  }
}

// Play Again button
document.getElementById('playAgain').addEventListener('click', () => {
  const pick = pickWord(null);
  game.word = pick.word;
  game.category = pick.category;
  game.guessed = [];
  game.allGuesses = [];
  game.wrong = 0;
  game.status = 'playing';
  render();
});

// Initial render
render();
</script>
</body>
</html>
