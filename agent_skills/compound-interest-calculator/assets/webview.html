<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compound Interest Calculator</title>
<style>
  body { margin: 0; padding: 16px; font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; }
  h2 { color: #64ffda; margin: 0 0 16px; font-size: 18px; }
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .card { background: #16213e; border-radius: 8px; padding: 14px; text-align: center; }
  .card .value { font-size: 24px; font-weight: bold; color: #64ffda; }
  .card .label { font-size: 11px; color: #a8b2d1; margin-top: 4px; }
  canvas { width: 100%; max-height: 300px; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; color: #64ffda; padding: 6px 8px; border-bottom: 1px solid #0f3460; background: #16213e; position: sticky; top: 0; }
  td { padding: 4px 8px; color: #ccc; border-bottom: 1px solid #0f3460; }
  .table-wrap { max-height: 300px; overflow-y: auto; background: #16213e; border-radius: 8px; }
</style>
</head>
<body>
<h2>Compound Interest Calculator</h2>
<div class="summary" id="summary"></div>
<canvas id="chart"></canvas>
<div class="table-wrap"><table id="table"></table></div>
<script>
const params = new URLSearchParams(window.location.search);
const input = JSON.parse(decodeURIComponent(params.get('data')));
const P = input.principal || 10000;
const r = (input.rate || 5) / 100;
const years = input.years || 10;
const n = input.compound_frequency || 12;
const monthly = input.monthly_contribution || 0;

const data = []; let balance = P;
for (let y = 0; y <= years; y++) {
  data.push({ year: y, balance: balance, contributions: P + monthly * 12 * y, interest: balance - P - monthly * 12 * y });
  if (y < years) {
    for (let m = 0; m < 12; m++) {
      balance = balance * (1 + r / n) + monthly;
    }
  }
}

const final = data[data.length - 1];
const totalContributions = P + monthly * 12 * years;
const totalInterest = final.balance - totalContributions;
const fmt = n => '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

document.getElementById('summary').innerHTML = `
  <div class="card"><div class="value">${fmt(final.balance)}</div><div class="label">Final Balance</div></div>
  <div class="card"><div class="value">${fmt(totalContributions)}</div><div class="label">Total Contributions</div></div>
  <div class="card"><div class="value">${fmt(totalInterest)}</div><div class="label">Total Interest</div></div>
  <div class="card"><div class="value">${(totalInterest / totalContributions * 100).toFixed(1)}%</div><div class="label">Return on Contributions</div></div>`;

// Chart
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
canvas.width = canvas.offsetWidth * 2; canvas.height = 400;
ctx.scale(2, 2);
const cw = canvas.offsetWidth, ch = 200, pad = 40;
const maxVal = final.balance;
ctx.fillStyle = '#16213e'; ctx.fillRect(0, 0, cw, ch);
// Grid
ctx.strokeStyle = '#0f3460'; ctx.lineWidth = 0.5;
for (let i = 0; i <= 4; i++) {
  const y = pad + (ch - 2 * pad) * (1 - i / 4);
  ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(cw - 10, y); ctx.stroke();
  ctx.fillStyle = '#a8b2d1'; ctx.font = '9px sans-serif'; ctx.fillText(fmt(maxVal * i / 4), 2, y + 3);
}
// Bars
const barW = (cw - pad - 20) / data.length * 0.6;
const gap = (cw - pad - 20) / data.length;
data.forEach((d, i) => {
  const x = pad + i * gap + gap * 0.2;
  const contribH = (d.contributions / maxVal) * (ch - 2 * pad);
  const totalH = (d.balance / maxVal) * (ch - 2 * pad);
  ctx.fillStyle = '#0f3460'; ctx.fillRect(x, ch - pad - totalH, barW, totalH);
  ctx.fillStyle = '#64ffda'; ctx.fillRect(x, ch - pad - contribH, barW, contribH);
  if (data.length <= 20 || i % Math.ceil(data.length / 10) === 0) {
    ctx.fillStyle = '#a8b2d1'; ctx.font = '9px sans-serif'; ctx.fillText(`Y${d.year}`, x, ch - pad + 12);
  }
});

// Table
document.getElementById('table').innerHTML = '<tr><th>Year</th><th>Balance</th><th>Contributions</th><th>Interest</th></tr>' +
  data.map(d => `<tr><td>${d.year}</td><td>${fmt(d.balance)}</td><td>${fmt(d.contributions)}</td><td>${fmt(d.interest)}</td></tr>`).join('');
</script>
</body>
</html>
