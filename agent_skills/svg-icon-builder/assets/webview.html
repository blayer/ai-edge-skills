<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG Icon Builder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .icon-display {
      background: #16213e;
      border-radius: 16px;
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .icon-display svg {
      width: 200px;
      height: 200px;
    }
    .info {
      background: #16213e;
      border-radius: 12px;
      padding: 20px 28px;
      width: 100%;
      max-width: 360px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #2a2a4a;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #888; font-size: 14px; }
    .info-value { color: #64ffda; font-size: 14px; font-weight: 600; }
    .color-swatch {
      display: inline-block;
      width: 16px;
      height: 16px;
      border-radius: 3px;
      vertical-align: middle;
      margin-right: 6px;
      border: 1px solid #444;
    }
  </style>
</head>
<body>
  <div class="icon-display" id="iconDisplay"></div>
  <div class="info" id="info"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('data');
    if (raw) {
      try {
        const data = JSON.parse(decodeURIComponent(raw));
        document.getElementById('iconDisplay').innerHTML = data.svg || '';
        const info = document.getElementById('info');
        const rows = [
          ['Shape', data.shape || 'circle'],
          ['Color', `<span class="color-swatch" style="background:${data.color}"></span>${data.color}`],
          ['Size', `${data.size}px`],
          ['Background', data.background === 'transparent' ? 'Transparent' : `<span class="color-swatch" style="background:${data.background}"></span>${data.background}`]
        ];
        info.innerHTML = rows.map(([label, value]) =>
          `<div class="info-row"><span class="info-label">${label}</span><span class="info-value">${value}</span></div>`
        ).join('');
      } catch (e) {
        document.body.innerHTML = '<p style="color:#ff6b6b">Error: ' + e.message + '</p>';
      }
    }
  </script>
</body>
</html>
